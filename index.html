<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷霆战机 - 移动端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #0a0a2e 0%, #1a1a4e 100%);
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .hp-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 24px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6666);
            transition: width 0.2s;
            border-radius: 10px;
        }
        
        .hp-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }
        
        .stats {
            position: absolute;
            top: 42px;
            left: 10px;
            color: #fff;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
            line-height: 1.6;
        }
        
        .turret-info {
            position: absolute;
            top: 42px;
            right: 10px;
            color: #ffaa00;
            font-size: 12px;
            text-align: right;
            text-shadow: 1px 1px 2px #000;
        }
        
        .boss-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff0000;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            transition: opacity 0.3s;
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.88);
            z-index: 20;
            pointer-events: auto;
        }
        
        .title {
            color: #ffdd00;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff6600;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }
        
        .btn {
            padding: 15px 50px;
            font-size: 20px;
            color: #fff;
            background: linear-gradient(180deg, #ff6600, #cc3300);
            border: none;
            border-radius: 30px;
            margin: 10px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .score {
            color: #fff;
            font-size: 18px;
            margin: 10px;
        }
        
        .instructions {
            color: #aaa;
            font-size: 13px;
            text-align: center;
            margin: 15px 20px;
            line-height: 1.8;
            max-width: 320px;
        }
        
        .instructions span {
            color: #ffdd00;
        }
        
        .hidden {
            display: none !important;
        }
        
        .damage-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.1s;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div class="hp-bar">
        <div class="hp-fill" id="hpFill"></div>
        <div class="hp-text" id="hpText">200 / 200</div>
    </div>
    <div class="stats">
        <div>分数: <span id="score" style="color:#ffdd00">0</span></div>
        <div>子弹数: <span id="bulletCount" style="color:#00ddff">1</span> / 12</div>
        <div>子弹速度: <span id="bulletSpeed" style="color:#00ddff">1</span></div>
        <div>击杀: <span id="killCount" style="color:#ff6666">0</span> / 30</div>
    </div>
    <div class="turret-info">
        <div>炮台: <span id="turretCount" style="color:#ffaa00">0</span> / 5</div>
        <div id="bossInfo" style="color:#ff0000; margin-top:4px;"></div>
    </div>
</div>

<div class="boss-warning" id="bossWarning">BOSS 来袭!</div>

<div class="damage-flash" id="damageFlash"></div>

<div id="startScreen">
    <div class="title">雷霆战机</div>
    <div class="instructions">
        <span>操作：</span>手指拖动控制飞机<br>
        <span>绿色十字</span> = 回满血(200)<br>
        <span>蓝色光球</span> = 子弹升级(数量/速度)<br>
        <span>橙色方块</span> = 炮台道具(底部自动射击)<br>
        <span>红色警告</span> = 每30击杀出现BOSS<br>
        血量上限200，每秒自动回2<br>
        被敌弹击中扣1，撞击扣5
    </div>
    <button class="btn" onclick="startGame()">开始游戏</button>
</div>

<div id="gameOverScreen" class="hidden">
    <div class="title" style="color:#ff3333">游戏结束</div>
    <div class="score">最终得分: <span id="finalScore">0</span></div>
    <div class="score" style="font-size:14px; color:#aaa">击败BOSS: <span id="finalBossCount">0</span></div>
    <button class="btn" onclick="restartGame()">重新开始</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let gameRunning = false;
let score = 0;
let lastTime = 0;
let hpRegenTimer = 0;
let gameTime = 0;

const player = {
    x: 0, y: 0,
    width: 40, height: 50,
    hp: 200, maxHp: 200,
    bulletCount: 1,
    bulletSpeed: 1,
    shootTimer: 0,
    invincible: 0
};

let turrets = [];
let turretCount = 0;
let bullets = [];
let enemyBullets = [];
let enemies = [];
let items = [];
let particles = [];
let stars = [];
let bosses = [];

let killCount = 0;
let bossCount = 0;
let bossWarningTimer = 0;
let isBossFight = false;

let touchX = 0, touchY = 0;
let isTouching = false;

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    isTouching = true;
    const touch = e.touches[0];
    touchX = touch.clientX;
    touchY = touch.clientY;
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    touchX = touch.clientX;
    touchY = touch.clientY;
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    isTouching = false;
}, {passive: false});

canvas.addEventListener('mousemove', (e) => {
    if (e.buttons === 1) {
        touchX = e.clientX;
        touchY = e.clientY;
        isTouching = true;
    }
});
canvas.addEventListener('mousedown', (e) => {
    touchX = e.clientX;
    touchY = e.clientY;
    isTouching = true;
});
canvas.addEventListener('mouseup', () => isTouching = false);

function initStars() {
    stars = [];
    for (let i = 0; i < 100; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 1.5 + 0.3
        });
    }
}

let enemySpawnTimer = 0;
function spawnEnemy(dt) {
    if (isBossFight) return;
    enemySpawnTimer += dt;
    
    const difficulty = Math.min(gameTime / 60, 3);
    const baseInterval = Math.max(0.3, 1.5 - difficulty * 0.3);
    const maxEnemies = Math.min(3 + Math.floor(difficulty * 2), 8);
    
    if (enemySpawnTimer >= baseInterval && enemies.length < maxEnemies) {
        enemySpawnTimer = 0;
        const type = Math.random() < 0.25 ? 'strong' : 'normal';
        enemies.push({
            x: Math.random() * (canvas.width - 60) + 30,
            y: -40,
            width: type === 'strong' ? 55 : 35,
            height: type === 'strong' ? 50 : 35,
            hp: type === 'strong' ? 50 : 2,
            maxHp: type === 'strong' ? 50 : 2,
            speed: type === 'strong' ? 1.2 : 2 + Math.random() * 0.5,
            type: type,
            shootTimer: 0,
            shootInterval: Math.max(0.6, 2.5 - difficulty * 0.4),
            bulletCount: type === 'strong' ? 2 + Math.floor(difficulty) : 1 + Math.floor(difficulty * 0.5)
        });
    }
}

function spawnBoss() {
    if (isBossFight) return;
    isBossFight = true;
    bossCount++;
    const shield = 50 * bossCount;
    
    bosses.push({
        x: canvas.width / 2,
        y: canvas.height * 0.25,
        width: 90,
        height: 80,
        hp: 20,
        maxHp: 20,
        shield: shield,
        maxShield: shield,
        speed: 2.5,
        vx: (Math.random() < 0.5 ? 1 : -1) * 2.5,
        vy: (Math.random() < 0.5 ? 1 : -1) * 1.5,
        shootTimer: 0,
        shootInterval: 0.4,
        bulletCount: 5 + Math.min(bossCount * 2, 15),
        phaseTimer: 0,
        angle: 0
    });
    
    bossWarningTimer = 2.5;
    const warning = document.getElementById('bossWarning');
    warning.style.opacity = '1';
    warning.textContent = `第 ${bossCount} 波 BOSS!`;
    
    setTimeout(() => {
        warning.style.opacity = '0';
    }, 2000);
}

let itemSpawnTimer = 0;
function spawnItem(dt) {
    itemSpawnTimer += dt;
    if (itemSpawnTimer >= 8) {
        itemSpawnTimer = 0;
        const rand = Math.random();
        let type;
        if (rand < 0.33) type = 'heal';
        else if (rand < 0.66) type = 'bullet';
        else type = 'turret';
        
        items.push({
            x: Math.random() * (canvas.width - 30) + 15,
            y: -20,
            width: 24, height: 24,
            type: type,
            speed: 1.5,
            angle: 0
        });
    }
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1,
            color: color,
            size: Math.random() * 4 + 1
        });
    }
}

function checkCollision(a, b) {
    return a.x - a.width/2 < b.x + b.width/2 &&
           a.x + a.width/2 > b.x - b.width/2 &&
           a.y - a.height/2 < b.y + b.height/2 &&
           a.y + a.height/2 > b.y - b.height/2;
}

function update(dt) {
    if (!gameRunning) return;
    gameTime += dt;
    
    if (bossWarningTimer > 0) {
        bossWarningTimer -= dt;
        if (bossWarningTimer <= 0) {
            document.getElementById('bossWarning').style.opacity = '0';
        }
        return;
    }
    
    if (isTouching) {
        const dx = touchX - player.x;
        const dy = touchY - player.y;
        player.x += dx * 0.15;
        player.y += dy * 0.15;
    }
    
    player.x = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.x));
    player.y = Math.max(player.height/2, Math.min(canvas.height - player.height/2, player.y));
    
    if (player.invincible > 0) player.invincible -= dt;
    
    hpRegenTimer += dt;
    if (hpRegenTimer >= 1) {
        hpRegenTimer -= 1;
        if (player.hp < player.maxHp) {
            player.hp = Math.min(player.maxHp, player.hp + 2);
        }
    }
    
    player.shootTimer += dt;
    const shootInterval = Math.max(0.08, 0.2 - player.bulletSpeed * 0.015);
    if (player.shootTimer >= shootInterval) {
        player.shootTimer = 0;
        const baseSpeed = 8 + player.bulletSpeed * 0.5;
        const count = player.bulletCount;
        const spread = Math.min(70, count * 6);
        
        for (let i = 0; i < count; i++) {
            const angle = -Math.PI/2 + (i - (count-1)/2) * (spread / count) * (Math.PI/180);
            bullets.push({
                x: player.x,
                y: player.y - player.height/2,
                vx: Math.cos(angle) * baseSpeed,
                vy: Math.sin(angle) * baseSpeed,
                width: 4, height: 12,
                damage: 1
            });
        }
    }
    
    turrets.forEach(t => {
        t.shootTimer += dt;
        if (t.shootTimer >= 0.35) {
            t.shootTimer = 0;
            let nearest = null;
            let minDist = Infinity;
            const targets = [...enemies, ...bosses];
            targets.forEach(e => {
                const d = Math.hypot(e.x - t.x, e.y - t.y);
                if (d < minDist) {
                    minDist = d;
                    nearest = e;
                }
            });
            
            const angle = nearest ? 
                Math.atan2(nearest.y - t.y, nearest.x - t.x) : 
                -Math.PI/2;
            
            bullets.push({
                x: t.x,
                y: t.y - 10,
                vx: Math.cos(angle) * 10,
                vy: Math.sin(angle) * 10,
                width: 5, height: 5,
                damage: 2,
                isTurret: true,
                color: '#ffaa00'
            });
        }
    });
    
    bullets = bullets.filter(b => {
        b.x += b.vx;
        b.y += b.vy;
        return b.y > -20 && b.y < canvas.height + 20 && b.x > -20 && b.x < canvas.width + 20;
    });
    
    enemyBullets = enemyBullets.filter(b => {
        b.x += b.vx;
        b.y += b.vy;
        return b.y < canvas.height + 20 && b.y > -20 && b.x > -20 && b.x < canvas.width + 20;
    });
    
    enemies = enemies.filter(e => {
        e.y += e.speed;
        e.shootTimer += dt;
        
        if (e.shootTimer >= e.shootInterval) {
            e.shootTimer = 0;
            const angle = Math.atan2(player.y - e.y, player.x - e.x);
            const bc = e.bulletCount || 1;
            for (let i = 0; i < bc; i++) {
                const spread = (bc - 1) * 0.15;
                const a = angle + (i - (bc-1)/2) * spread;
                enemyBullets.push({
                    x: e.x,
                    y: e.y + e.height/2,
                    vx: Math.cos(a) * 4,
                    vy: Math.sin(a) * 4,
                    width: 6, height: 6,
                    damage: 1
                });
            }
        }
        
        return e.y < canvas.height + 50 && e.hp > 0;
    });
    
    bosses = bosses.filter(b => {
        b.phaseTimer += dt;
        b.angle += dt * 2;
        
        b.x += b.vx;
        b.y += b.vy;
        
        const marginX = b.width/2 + 10;
        const topY = 60;
        const bottomY = canvas.height * 0.55;
        
        if (b.x < marginX || b.x > canvas.width - marginX) b.vx *= -1;
        if (b.y < topY || b.y > bottomY) b.vy *= -1;
        
        b.x = Math.max(marginX, Math.min(canvas.width - marginX, b.x));
        b.y = Math.max(topY, Math.min(bottomY, b.y));
        
        if (b.phaseTimer > 3) {
            b.phaseTimer = 0;
            b.vx = (Math.random() < 0.5 ? 1 : -1) * (2 + Math.random() * 2);
            b.vy = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.random());
        }
        
        b.shootTimer += dt;
        if (b.shootTimer >= b.shootInterval) {
            b.shootTimer = 0;
            const baseAngle = Math.atan2(player.y - b.y, player.x - b.x);
            
            let bc = b.bulletCount;
            let ringCount = 16 + bossCount * 4;
            let spiralCount = bossCount >= 2 ? 6 : 0;
            
            if (bossCount >= 3) {
                bc *= 2;
                ringCount *= 2;
                spiralCount *= 2;
            }
            
            for (let i = 0; i < bc; i++) {
                const spread = Math.min(1.6, bc * 0.08);
                const a = baseAngle + (i - (bc-1)/2) * spread;
                const speed = 5 + Math.min(bossCount * 0.3, 3);
                enemyBullets.push({
                    x: b.x,
                    y: b.y + b.height/2,
                    vx: Math.cos(a) * speed,
                    vy: Math.sin(a) * speed,
                    width: 8, height: 8,
                    damage: 2,
                    isBoss: true
                });
            }
            
            for (let i = 0; i < ringCount; i++) {
                const a = (Math.PI * 2 / ringCount) * i + b.angle;
                enemyBullets.push({
                    x: b.x,
                    y: b.y,
                    vx: Math.cos(a) * 3.5,
                    vy: Math.sin(a) * 3.5,
                    width: 5, height: 5,
                    damage: 1,
                    isBoss: true
                });
            }
            
            if (spiralCount > 0) {
                for (let i = 0; i < spiralCount; i++) {
                    const a = b.angle * 2 + (Math.PI * 2 / spiralCount) * i;
                    const speed = 4 + Math.sin(b.angle) * 1.5;
                    enemyBullets.push({
                        x: b.x,
                        y: b.y,
                        vx: Math.cos(a) * speed,
                        vy: Math.sin(a) * speed,
                        width: 6, height: 6,
                        damage: 1,
                        isBoss: true
                    });
                }
            }
        }
        
        return b.hp > 0;
    });
    
    if (isBossFight && bosses.length === 0) {
        isBossFight = false;
        killCount = 0;
    }
    
    items = items.filter(item => {
        item.y += item.speed;
        item.angle += dt * 3;
        return item.y < canvas.height + 30;
    });
    
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dt * 2;
        p.vx *= 0.95;
        p.vy *= 0.95;
        return p.life > 0;
    });
    
    stars.forEach(s => {
        s.y += s.speed;
        if (s.y > canvas.height) {
            s.y = 0;
            s.x = Math.random() * canvas.width;
        }
    });
    
    bullets.forEach(b => {
        [...enemies, ...bosses].forEach(e => {
            if (checkCollision(b, e)) {
                b.hit = true;
                if (e.shield && e.shield > 0) {
                    e.shield -= b.damage;
                    if (e.shield < 0) {
                        e.hp += e.shield;
                        e.shield = 0;
                    }
                    createParticles(b.x, b.y, '#4488ff', 3);
                } else {
                    e.hp -= b.damage;
                    createParticles(b.x, b.y, '#ff6600', 4);
                }
                
                if (e.hp <= 0) {
                    if (bosses.includes(e)) {
                        score += 200 + bossCount * 50;
                        createParticles(e.x, e.y, '#ff0000', 30);
                        createParticles(e.x, e.y, '#ffdd00', 15);
                    } else {
                        score += e.type === 'strong' ? 50 : 20;
                        killCount++;
                        if (killCount >= 30 && !isBossFight) {
                            spawnBoss();
                        }
                        createParticles(e.x, e.y, '#ff6600', 8);
                    }
                }
            }
        });
    });
    bullets = bullets.filter(b => !b.hit);
    enemies = enemies.filter(e => e.hp > 0);
    
    enemyBullets.forEach(b => {
        if (checkCollision(b, player)) {
            player.hp -= b.damage;
            b.hit = true;
            createParticles(player.x, player.y, '#ff0000', 5);
            showDamage();
        }
    });
    enemyBullets = enemyBullets.filter(b => !b.hit);
    
    enemies.forEach(e => {
        if (checkCollision(e, player) && player.invincible <= 0) {
            player.hp -= 5;
            player.invincible = 1;
            e.hp = 0;
            createParticles(player.x, player.y, '#ff0000', 10);
            showDamage();
        }
    });
    
    bosses.forEach(b => {
        if (checkCollision(b, player) && player.invincible <= 0) {
            player.hp -= 10;
            player.invincible = 1.5;
            createParticles(player.x, player.y, '#ff0000', 15);
            showDamage();
        }
    });
    
    items = items.filter(item => {
        if (checkCollision(item, player)) {
            if (item.type === 'heal') {
                player.hp = player.maxHp;
                createParticles(player.x, player.y, '#00ff00', 12);
            } else if (item.type === 'bullet') {
                if (player.bulletCount < 12) {
                    player.bulletCount++;
                } else {
                    player.bulletSpeed++;
                }
                createParticles(player.x, player.y, '#00ddff', 10);
            } else if (item.type === 'turret') {
                if (turretCount < 5) {
                    turretCount++;
                    const spacing = canvas.width / (turretCount + 1);
                    turrets = [];
                    for (let i = 1; i <= turretCount; i++) {
                        turrets.push({
                            x: spacing * i,
                            y: canvas.height - 30,
                            shootTimer: 0
                        });
                    }
                }
                createParticles(player.x, player.y, '#ffaa00', 10);
            }
            return false;
        }
        return true;
    });
    
    if (player.hp <= 0) {
        gameOver();
    }
    
    spawnEnemy(dt);
    spawnItem(dt);
    updateUI();
}

function showDamage() {
    const flash = document.getElementById('damageFlash');
    flash.style.opacity = '1';
    setTimeout(() => flash.style.opacity = '0', 100);
}

function updateUI() {
    const hpPercent = Math.max(0, (player.hp / player.maxHp) * 100);
    document.getElementById('hpFill').style.width = hpPercent + '%';
    document.getElementById('hpText').textContent = `${Math.ceil(Math.max(0, player.hp))} / ${player.maxHp}`;
    document.getElementById('score').textContent = score;
    document.getElementById('bulletCount').textContent = player.bulletCount;
    document.getElementById('bulletSpeed').textContent = player.bulletSpeed;
    document.getElementById('turretCount').textContent = turretCount;
    document.getElementById('killCount').textContent = killCount;
    
    const bossInfo = document.getElementById('bossInfo');
    if (isBossFight && bosses.length > 0) {
        const b = bosses[0];
        bossInfo.innerHTML = `BOSS ${bossCount}<br>盾:${Math.ceil(b.shield)} 血:${Math.ceil(b.hp)}`;
    } else {
        bossInfo.textContent = '';
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#fff';
    stars.forEach(s => {
        ctx.globalAlpha = Math.random() * 0.5 + 0.3;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    
    turrets.forEach(t => {
        ctx.fillStyle = '#444';
        ctx.fillRect(t.x - 15, t.y - 5, 30, 10);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(t.x - 4, t.y - 20, 8, 20);
        ctx.shadowColor = '#ffaa00';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#ffdd00';
        ctx.beginPath();
        ctx.arc(t.x, t.y - 20, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });
    
    items.forEach(item => {
        ctx.save();
        ctx.translate(item.x, item.y);
        ctx.rotate(item.angle);
        
        if (item.type === 'heal') {
            ctx.fillStyle = '#00ff00';
            ctx.shadowColor = '#00ff00';
            ctx.shadowBlur = 15;
            ctx.fillRect(-4, -10, 8, 20);
            ctx.fillRect(-10, -4, 20, 8);
            ctx.fillStyle = '#fff';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('+', 0, 1);
        } else if (item.type === 'bullet') {
            ctx.fillStyle = '#00ddff';
            ctx.shadowColor = '#00ddff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u2191', 0, 3);
        } else if (item.type === 'turret') {
            ctx.fillStyle = '#ff8800';
            ctx.shadowColor = '#ff8800';
            ctx.shadowBlur = 15;
            ctx.fillRect(-10, -10, 20, 20);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u70AE', 0, 3);
        }
        
        ctx.shadowBlur = 0;
        ctx.restore();
    });
    
    ctx.fillStyle = '#ff4444';
    enemyBullets.forEach(b => {
        if (b.isBoss) {
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 6;
        }
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.width/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });
    
    bullets.forEach(b => {
        ctx.fillStyle = b.color || '#00ff88';
        ctx.shadowColor = b.color || '#00ff88';
        ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.width/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });
    
    enemies.forEach(e => {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillStyle = e.type === 'strong' ? '#aa0000' : '#ff4444';
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(0, e.height/2);
        ctx.lineTo(-e.width/2, -e.height/2);
        ctx.lineTo(0, -e.height/4);
        ctx.lineTo(e.width/2, -e.height/2);
        ctx.closePath();
        ctx.fill();
        
        if (e.type === 'strong') {
            ctx.strokeStyle = '#ffdd00';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        if (e.hp < e.maxHp) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#333';
            ctx.fillRect(-e.width/2, -e.height/2 - 8, e.width, 4);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(-e.width/2, -e.height/2 - 8, e.width * (e.hp/e.maxHp), 4);
        }
        ctx.shadowBlur = 0;
        ctx.restore();
    });
    
    bosses.forEach(b => {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(Math.sin(b.angle) * 0.1);
        
        if (b.shield > 0) {
            ctx.strokeStyle = '#4488ff';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#4488ff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(0, 0, b.width/2 + 18, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        ctx.fillStyle = '#660000';
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 25;
        ctx.beginPath();
        ctx.moveTo(0, -b.height/2);
        ctx.lineTo(-b.width/2, 0);
        ctx.lineTo(-b.width/3, b.height/2);
        ctx.lineTo(0, b.height/3);
        ctx.lineTo(b.width/3, b.height/2);
        ctx.lineTo(b.width/2, 0);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = '#cc0000';
        ctx.beginPath();
        ctx.moveTo(0, -b.height/2 + 12);
        ctx.lineTo(-b.width/3, 0);
        ctx.lineTo(0, b.height/4);
        ctx.lineTo(b.width/3, 0);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = '#ffdd00';
        ctx.beginPath();
        ctx.arc(0, -5, 10, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        
        const barW = b.width + 30;
        const barH = 7;
        const barY = -b.height/2 - 30;
        ctx.fillStyle = '#222';
        ctx.fillRect(-barW/2, barY, barW, barH);
        
        if (b.shield > 0) {
            ctx.fillStyle = '#4488ff';
            ctx.fillRect(-barW/2, barY, barW * (b.shield/b.maxShield), barH);
        }
        
        const hpBarWidth = barW * (1 - b.shield/b.maxShield);
        const hpBarX = -barW/2 + barW * (b.shield/b.maxShield);
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(hpBarX, barY, Math.max(0, hpBarWidth * (b.hp/b.maxHp)), barH);
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`BOSS ${bossCount}`, 0, barY - 5);
        
        ctx.restore();
    });
    
    if (gameRunning) {
        ctx.save();
        ctx.translate(player.x, player.y);
        
        if (player.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
            ctx.globalAlpha = 0.5;
        }
        
        ctx.fillStyle = '#ff6600';
        ctx.shadowColor = '#ff6600';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(-6, player.height/2);
        ctx.lineTo(0, player.height/2 + 15 + Math.random() * 10);
        ctx.lineTo(6, player.height/2);
        ctx.fill();
        
        ctx.fillStyle = '#00aaff';
        ctx.shadowColor = '#00aaff';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(0, -player.height/2);
        ctx.lineTo(-player.width/2, player.height/2);
        ctx.lineTo(0, player.height/3);
        ctx.lineTo(player.width/2, player.height/2);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = '#00ffcc';
        ctx.beginPath();
        ctx.arc(0, -5, 6, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#ffdd00';
        ctx.fillRect(-player.width/2 + 3, 5, 4, 10);
        ctx.fillRect(player.width/2 - 7, 5, 4, 10);
        
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        ctx.restore();
    }
    
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    
    update(dt);
    draw();
    
    requestAnimationFrame(gameLoop);
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    
    player.x = canvas.width / 2;
    player.y = canvas.height - 100;
    player.hp = 200;
    player.bulletCount = 1;
    player.bulletSpeed = 1;
    player.invincible = 0;
    
    turrets = [];
    turretCount = 0;
    bullets = [];
    enemyBullets = [];
    enemies = [];
    items = [];
    particles = [];
    bosses = [];
    
    score = 0;
    killCount = 0;
    bossCount = 0;
    isBossFight = false;
    gameTime = 0;
    hpRegenTimer = 0;
    enemySpawnTimer = 0;
    itemSpawnTimer = 0;
    bossWarningTimer = 0;
    
    touchX = player.x;
    touchY = player.y;
    
    initStars();
    gameRunning = true;
    lastTime = performance.now();
}

function gameOver() {
    gameRunning = false;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalBossCount').textContent = bossCount;
    document.getElementById('gameOverScreen').classList.remove('hidden');
}

function restartGame() {
    startGame();
}

initStars();
requestAnimationFrame(gameLoop);
</script>

</body>
</html>
